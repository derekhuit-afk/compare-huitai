name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=huitai
        env:
          VERCEL_ORG_ID: team_E1HSbARAkTSoOPfd13P7zsJA
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
